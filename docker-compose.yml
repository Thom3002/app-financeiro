
services:
  backend:
    build: ./backend
    container_name: app-financeiro-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - ./backend/data:/app/data
    environment:
      - NODE_ENV=development
      - DATABASE_PATH=/app/data/financeiro.db
    command: npm run start:dev

  frontend:
    build: ./frontend
    container_name: app-financeiro-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  backend_node_modules:
  frontend_node_modules:
