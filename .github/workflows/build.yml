name: Draft Beta Releases

on:
  push:
    branches:
      - main # Dispara toda vez que você enviar código para a branch main
      - dev  # Dispara toda vez que você enviar código para a branch dev
    tags:
      - 'v*' # Mantém suporte para as tags de versão final

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0 # Node atualizado para suportar o electron-builder
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci

      - name: Build Backend (NestJS)
        working-directory: backend
        run: npm run build

      - name: Run Backend Tests
        working-directory: backend
        run: npm run test

      - name: Update Package Version for Dev/Beta
        working-directory: backend
        shell: bash
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          if [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            NEW_VERSION="${BASE_VERSION}-dev.${{ github.run_number }}"
            echo "Setting dev version to $NEW_VERSION"
            npm version $NEW_VERSION --no-git-tag-version
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            NEW_VERSION="${BASE_VERSION}-beta.${{ github.run_number }}"
            echo "Setting beta version to $NEW_VERSION"
            npm version $NEW_VERSION --no-git-tag-version
          fi

      - name: Rebuild native modules for Electron
        working-directory: backend
        run: npm run electron:rebuild

      - name: Build Electron App
        working-directory: backend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist

      # Salva os artefatos de cada OS para o job de release coletar depois
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            backend/release/**/*Setup*.exe
            backend/release/**/*.dmg
          if-no-files-found: ignore

  release:
    # Roda DEPOIS que os dois builds (Mac e Windows) terminaram com sucesso
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Dev Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/dev'
        with:
          name: "Dev 1.1.${{ github.run_number }}"
          tag_name: "dev-1.1.${{ github.run_number }}"
          prerelease: true
          fail_on_unmatched_files: false
          files: |
            artifacts/**/*Setup*.exe
            artifacts/**/*.dmg

      - name: Beta Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main'
        with:
          name: "Beta 1.1.${{ github.run_number }}"
          tag_name: "beta-1.1.${{ github.run_number }}"
          prerelease: true
          fail_on_unmatched_files: false
          files: |
            artifacts/**/*Setup*.exe
            artifacts/**/*.dmg

      - name: Official Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: true
          fail_on_unmatched_files: false
          files: |
            artifacts/**/*Setup*.exe
            artifacts/**/*.dmg
