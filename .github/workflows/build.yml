name: Draft Beta/Dev Releases

on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci

      - name: Build Backend (NestJS)
        working-directory: backend
        run: npm run build

      - name: Update Package Version for Dev/Beta
        working-directory: backend
        shell: bash
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          if [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            NEW_VERSION="${BASE_VERSION}-dev.${{ github.run_number }}"
            echo "Setting dev version: $NEW_VERSION"
            npm version $NEW_VERSION --no-git-tag-version
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            NEW_VERSION="${BASE_VERSION}-beta.${{ github.run_number }}"
            echo "Setting beta version: $NEW_VERSION"
            npm version $NEW_VERSION --no-git-tag-version
          fi

      - name: Build Electron App
        working-directory: backend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist

      - name: Prepare Update Channel Metadata
        working-directory: backend
        shell: bash
        run: |
          cd release
          if [ -f "latest.yml" ]; then
            # beta.yml: direct copy of latest.yml (beta channel)
            cp latest.yml beta.yml
            echo "Copied latest.yml to beta.yml"

            # dev.yml: replace "-beta." with "-dev." so that electron-updater
            # on the "dev" channel accepts the update (channel must match)
            # Using perl instead of sed -i to support both GNU (Linux) and BSD (macOS) sed
            cp latest.yml dev.yml
            perl -i -pe 's/-beta\./-dev./g' dev.yml
            echo "Created dev.yml with dev channel version"
            echo "--- dev.yml content ---"
            cat dev.yml
          fi
          if [ -f "latest-mac.yml" ]; then
            cp latest-mac.yml beta-mac.yml
            cp latest-mac.yml dev-mac.yml
            perl -i -pe 's/-beta\./-dev./g' dev-mac.yml
            echo "Created dev-mac.yml with dev channel version"
          fi

      # Salva os artefatos de cada OS para o job de release coletar depois
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            backend/release/**/*Setup*.exe
            backend/release/**/*.dmg
            backend/release/**/*.yml
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Version
        id: get_version
        run: |
          BASE_VERSION=$(node -p "require('./backend/package.json').version")
          if [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            echo "version=${BASE_VERSION}-dev.${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "type=Dev" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "version=${BASE_VERSION}-beta.${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "type=Beta" >> $GITHUB_OUTPUT
          else
            echo "version=${BASE_VERSION}" >> $GITHUB_OUTPUT
            echo "type=Release" >> $GITHUB_OUTPUT
          fi

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Beta/Dev Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        with:
          name: "${{ steps.get_version.outputs.type }} ${{ steps.get_version.outputs.version }}"
          tag_name: "v${{ steps.get_version.outputs.version }}"
          prerelease: true
          fail_on_unmatched_files: false
          files: |
            artifacts/**/*Setup*.exe
            artifacts/**/*.dmg
            artifacts/**/*.yml

      - name: Official Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: true
          fail_on_unmatched_files: false
          files: |
            artifacts/**/*Setup*.exe
            artifacts/**/*.dmg
            artifacts/**/*.yml
