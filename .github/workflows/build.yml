name: Build & Release

on:
  push:
    branches:
      - main  # gera Beta release
      - dev   # gera Dev release (prerelease)
    tags:
      - 'v*'  # release oficial

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci

      - name: Build Backend (NestJS)
        working-directory: backend
        run: npm run build

      - name: Run Backend Tests
        working-directory: backend
        run: npm run test

      - name: Update Package Version for Dev/Beta
        working-directory: backend
        shell: bash
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          if [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            NEW_VERSION="${BASE_VERSION}-dev.${{ github.run_number }}"
            echo "Setting dev version: $NEW_VERSION"
            npm version $NEW_VERSION --no-git-tag-version
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            NEW_VERSION="${BASE_VERSION}-beta.${{ github.run_number }}"
            echo "Setting beta version: $NEW_VERSION"
            npm version $NEW_VERSION --no-git-tag-version
          fi

      - name: Build Electron App
        working-directory: backend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            backend/release/**/*Setup*.exe
            backend/release/**/*.dmg
            backend/release/latest-mac.yml
            backend/release/latest.yml
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Dev Release (branch dev)
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/dev'
        with:
          name: "Dev 1.1.${{ github.run_number }}"
          tag_name: "dev-1.1.${{ github.run_number }}"
          prerelease: true
          fail_on_unmatched_files: false
          files: |
            artifacts/**/*Setup*.exe
            artifacts/**/*.dmg
            artifacts/latest-mac.yml
            artifacts/latest.yml

      - name: Beta Release (branch main)
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main'
        with:
          name: "Beta 1.1.${{ github.run_number }}"
          tag_name: "beta-1.1.${{ github.run_number }}"
          prerelease: true
          fail_on_unmatched_files: false
          files: |
            artifacts/**/*Setup*.exe
            artifacts/**/*.dmg
            artifacts/latest-mac.yml
            artifacts/latest.yml

      - name: Official Release (tag)
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: true
          fail_on_unmatched_files: false
          files: |
            artifacts/**/*Setup*.exe
            artifacts/**/*.dmg
            artifacts/latest-mac.yml
            artifacts/latest.yml
