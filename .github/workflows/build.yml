name: Draft Beta Releases

on:
  push:
    branches:
      - main # Dispara toda vez que você enviar código para a branch main
    tags:
      - 'v*' # Mantém suporte para as tags de versão fina

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0 # Node atualizado para suportar o electron-builder
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci

      - name: Build Backend (NestJS)
        working-directory: backend
        run: npm run build

      - name: Build Electron App
        working-directory: backend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist

      - name: Beta Release Action
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main'
        with:
          name: "Beta Build (Latest)"
          tag_name: "beta-latest"
          prerelease: true
          overwrite: true
          allow_updates: true
          files: |
            backend/release/**/*Setup*.exe
            backend/release/**/*.dmg

      - name: Official Release Action
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            backend/release/**/*Setup*.exe
            backend/release/**/*.dmg
          draft: true
